<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Helpdesk Portal{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body data-authenticated="{{ 'true' if current_user else 'false' }}">
  <nav class="navbar navbar-expand-lg navbar-dark bg-navy">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="{{ url_for('dashboard') if current_user else url_for('login') }}">Northstar Helpdesk</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        {% if current_user %}
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('tickets') }}">Tickets</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('search') }}">Search</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('tools') }}">Tools</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('profile') }}">Profile</a></li>
        </ul>
        <div class="d-flex align-items-center gap-3">
          <span class="badge rounded-pill text-bg-light">{{ group_name }}</span>
          <span class="nav-user">{{ current_user.full_name }}</span>
          <form method="post" action="{{ url_for('logout') }}">
            <button class="btn btn-sm btn-outline-light" type="submit">Sign out</button>
          </form>
        </div>
        {% else %}
        <div class="ms-auto">
          <span class="badge rounded-pill text-bg-light">{{ group_name }}</span>
        </div>
        {% endif %}
      </div>
    </div>
  </nav>

  <main class="container page-shell">
    {% block content %}{% endblock %}
  </main>

  <footer class="container small text-muted py-4">
    Internal service desk portal · {{ group_name }}
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
